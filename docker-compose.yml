services:
  go2rtc:
    image: alexxit/go2rtc
    restart: unless-stopped
    volumes:
      - /mnt/birddata/go2rtc.yaml:/config/go2rtc.yaml:ro
    ports:
      - "8554:8554"   # RTSP restream — LAN clients and future Frigate consumer
      - "1984:1984"   # go2rtc web UI

  birdwatcher:
    build:
      context: /home/sleepy/BirdWatcher
      dockerfile: Dockerfile
    image: birdwatcher:latest
    container_name: SleepyBirds
    restart: unless-stopped
    runtime: nvidia
    depends_on:
      - go2rtc
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - TZ=America/New_York
      # Loads config from the data volume so no secrets go in the image.
      - BW_CONFIG=/data/config.yaml
    ports:
      - "8080:8080"
    volumes:
      - /mnt/birddata:/data
      - /mnt/birddata/species_catalog.json:/app/data/species_catalog.json
      - /mnt/birddata/assets/reference:/app/assets/reference
      - /etc/localtime:/etc/localtime:ro
    user: "1000:1000"   # sleepy

  birdwatcher-watch:
    image: birdwatcher:latest   # reuses the image built by the birdwatcher service above
    container_name: SleepyBirdsWatch
    restart: unless-stopped
    runtime: nvidia
    depends_on:
      - go2rtc
      - birdwatcher          # ensures the image is built before this starts
    command: ["python3", "run.py", "watch"]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - TZ=America/New_York
      - BW_CONFIG=/data/config.yaml
    volumes:
      - /mnt/birddata:/data
      - /mnt/birddata/species_catalog.json:/app/data/species_catalog.json
      - /etc/localtime:/etc/localtime:ro
    user: "1000:1000"   # sleepy

  # ── Creek / wildlife watcher (2nd camera) ──────────────────────────────────
  # Same image, second config: reads the Duo 3 via go2rtc, detects the broad
  # animal set (not just birds), tags sightings source=creek. Writes to the same
  # DB, so wildlife shows up in the dashboard alongside the feeder.
  birdwatcher-watch-creek:
    image: birdwatcher:latest
    container_name: SleepyBirdsWatchCreek
    restart: unless-stopped
    runtime: nvidia
    depends_on:
      - go2rtc
      - birdwatcher
    command: ["python3", "run.py", "watch"]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - TZ=America/New_York
      - BW_CONFIG=/data/config.creek.yaml
    volumes:
      - /mnt/birddata:/data
      - /mnt/birddata/species_catalog.json:/app/data/species_catalog.json
      - /etc/localtime:/etc/localtime:ro
    user: "1000:1000"   # sleepy

  # ── BirdNET-Go (audio) ────────────────────────────────────────────────────
  birdnet-go:
    image: ghcr.io/tphakala/birdnet-go:nightly
    container_name: BirdNETGo
    restart: unless-stopped
    environment:
      - TZ=America/New_York
    volumes:
      - /mnt/birddata/birdnet-go-app/config:/config
      - /mnt/birddata/birdnet-go-app/data:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8090:8080"   # BirdNET-Go dashboard
    # Add these when a microphone is connected:
    # devices:
    #   - /dev/snd:/dev/snd
    # group_add:
    #   - audio

  # ── Frigate (RTSP ingest + bird detection) ────────────────────────────────
  # When Frigate arrives it replaces go2rtc above (Frigate embeds go2rtc).
  # BirdWatcher will subscribe to Frigate's MQTT bird events instead of
  # reading the stream directly.
  #
  # frigate:
  #   image: ghcr.io/blakeblackshear/frigate:stable
  #   restart: unless-stopped
  #   privileged: true
  #   runtime: nvidia
  #   environment:
  #     - NVIDIA_VISIBLE_DEVICES=all
  #     - TZ=America/New_York
  #   volumes:
  #     - /mnt/birddata/frigate:/media/frigate
  #     - ./frigate.yml:/config/config.yml:ro
  #     - /etc/localtime:/etc/localtime:ro
  #   ports:
  #     - "5000:5000"    # Frigate web UI
  #     - "8971:8971"    # API
  #     - "8554:8554"    # go2rtc RTSP restream out (remove standalone go2rtc above)
  #     - "1984:1984"    # go2rtc web UI
