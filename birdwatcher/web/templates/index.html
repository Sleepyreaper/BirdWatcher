<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BirdWatcher 🐦</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>🐦 BirdWatcher</h1>
      <div class="region" id="region">Loading…</div>
    </div>
    <div class="right">
      <div class="weeknav">
        <button class="iconbtn" id="prev" title="Previous week">‹</button>
        <span id="weeklabel"></span>
        <button class="iconbtn" id="next" title="Next week">›</button>
        <button class="iconbtn" id="today" title="This week" style="width:auto;padding:0 10px;font-size:.8rem">today</button>
      </div>
      <a class="iconbtn" id="birdnet-link" href="#" target="_blank" title="Listen — open BirdNET-Go" style="width:auto;padding:0 10px;font-size:.8rem;text-decoration:none">🔊 listen</a>
      <a class="iconbtn" href="/review" title="Review &amp; fix IDs" style="width:auto;padding:0 10px;font-size:.8rem;text-decoration:none">✎ review</a>
      <button class="iconbtn" id="theme" title="Toggle light / dark">◐</button>
    </div>
  </header>

  <div class="page">
  <section id="stats" class="stats"></section>

  <section id="recent" class="lastvisit" hidden>
    <div class="lv-card" id="lv-card"></div>
  </section>

  <main class="gridwrap">
    <div id="grid" class="grid"></div>
    <div class="legend">
      <span id="legend-note"></span>
      <span class="scale">less
        <span class="sw" style="background:var(--cell-empty)"></span>
        <span class="sw" style="background:#B5D4F4"></span>
        <span class="sw" style="background:#85B7EB"></span>
        <span class="sw" style="background:#378ADD"></span>
        <span class="sw" style="background:#185FA5"></span>more
      </span>
    </div>
    <p id="empty" class="empty" hidden>No birds yet this week — the feeder's listening.</p>
  </main>

  <section class="nowcard" id="nowcard" hidden>
    <h3>● right now</h3>
    <div class="items" id="now-items"></div>
  </section>
  </div><!-- .page -->

  <div id="lightbox" class="lightbox" hidden>
    <div class="lightbox-inner">
      <button id="lb-close" class="lb-close" aria-label="close">×</button>
      <div id="lb-body"></div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
