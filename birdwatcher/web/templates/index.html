<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BirdWatcher 🐦</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>🐦 BirdWatcher</h1>
      <div class="region" id="region">Loading…</div>
    </div>
    <div class="weeknav">
      <button id="prev" title="Previous week">‹</button>
      <span id="weeklabel"></span>
      <button id="next" title="Next week">›</button>
      <button id="today" class="ghost">This week</button>
    </div>
  </header>

  <section id="stats" class="stats"></section>

  <main class="gridwrap">
    <div id="grid" class="grid"></div>
    <div class="legend">
      <span>fewer</span>
      <span class="sw" style="background:var(--panel-2)"></span>
      <span class="sw" style="background:hsl(45 55% 26%)"></span>
      <span class="sw" style="background:hsl(45 70% 40%)"></span>
      <span class="sw" style="background:hsl(45 80% 55%)"></span>
      <span>more</span>
    </div>
    <p id="empty" class="empty" hidden>No birds recorded this week yet — the watcher's listening.</p>
  </main>

  <div id="lightbox" class="lightbox" hidden>
    <div class="lightbox-inner">
      <button id="lb-close" class="lb-close" aria-label="close">×</button>
      <div id="lb-body"></div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
