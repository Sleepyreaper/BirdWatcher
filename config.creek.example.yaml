# Config for the SECOND watcher — the creek / wildlife (Reolink Duo 3) cam.
# Copy to /mnt/birddata/config.creek.yaml on the server.
# Same DB + captures as the feeder cam; only the camera, detector classes, and
# source tag differ. Safe to commit — no secrets (the RTSP creds live in go2rtc).

camera:
  # go2rtc restreams the Duo 3; use its low-res sub feed for detection (the 4K
  # panorama is 7680x2160 — too heavy to software-decode). Upgrade to a GPU
  # transcoded feed later for more detail.
  rtsp_url: "rtsp://go2rtc:8554/creekcam_sub"
  use_tcp: true
  source: "creek"          # tags every sighting from this cam

paths:
  db: "/data/birdwatcher.db"        # SAME db as the feeder cam
  captures: "/data/captures"

classifier:
  backend: "bioclip"
  bioclip_model: "hf-hub:imageomics/bioclip-2"
  min_confidence: 0.25

detector:
  # MegaDetector v6 (yolov9-e-1280) — built for wildlife/camera-trap scenes;
  # catches raccoon/opossum/deer that COCO can't, and small/distant animals.
  # Download once: wget -O /mnt/birddata/models/megadetector.pt \
  #   "https://zenodo.org/records/15398270/files/MDV6-yolov9-e-1280.pt?download=1"
  # It detects "animal"/"person"/"vehicle" — BioCLIP then IDs the animal crop,
  # and "person" is recorded straight as Homo sapiens (skips BioCLIP).
  model: "/data/models/megadetector.pt"
  min_confidence: 0.30
  classes: ["animal", "person"]
  imgsz: 1280   # MD's -1280 variant wants this to spot small/distant critters

pipeline:
  # Wildlife/panorama crops are lower-res than the feeder cam, so mammals score
  # a bit lower — a gentler floor than the feeder's 0.70 while we dial things in.
  min_confidence: 0.50

# No audio integration on this watcher (BirdNET-Go handles the feeder cam's mic).
weather:
  enabled: false
