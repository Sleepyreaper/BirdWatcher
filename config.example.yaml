# Copy this to /mnt/birddata/config.yaml on the server and fill in the camera URL.
# BirdWatcher reads it from there via the BW_CONFIG env var set in docker-compose.yml.
# This file is safe to commit — no secrets here, just structure.

camera:
  rtsp_url: "rtsp://CHANGE_ME"
  use_tcp: true

paths:
  db: "/data/birdwatcher.db"
  captures: "/data/captures"

web:
  host: "0.0.0.0"   # must be 0.0.0.0 inside the container
  port: 8080
  debug: false

classifier:
  backend: "bioclip"
  bioclip_model: "hf-hub:imageomics/bioclip-2"
  min_confidence: 0.25   # below this a bird is labeled "Unknown bird" (if kept at all)

detector:
  # Absolute path on the data volume — a bare filename makes YOLO try to
  # download into /app, which the uid-1000 container can't write.
  # First run: `mkdir -p /mnt/birddata/models` (YOLO downloads the weights there).
  model: "/data/models/yolov8n.pt"
  min_confidence: 0.35

pipeline:
  # Toss a visit whose best species match is below this — kills junk like a
  # squirrel tail scored 0.40 as a Tufted Titmouse. Lower it if real critters
  # (mammals score a bit lower vs the bird-heavy labels) start getting tossed.
  min_confidence: 0.70

audio:
  birdnet_db: ""   # /data/birdnet-go/birdnet.db when birdnet-go container is running

weather:
  enabled: true
  latitude: 33.94
  longitude: -84.55
