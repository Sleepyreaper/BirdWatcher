# Copy this to config.yaml and fill in your camera's RTSP URL.
# (config.yaml is git-ignored so your URL stays private.)

camera:
  # From UniFi Protect: open the camera -> enable RTSP, copy its URL.
  # Modern Protect gives an RTSPS (TLS) URL on port 7441, e.g.
  #   rtsps://192.168.1.1:7441/<streamId>?enableSrtp
  # If a stream with "?enableSrtp" won't open, drop that suffix — FFmpeg/OpenCV
  # often can't decode SRTP. You can also set the RTSP_URL env var instead.
  rtsp_url: "rtsps://192.168.1.1:7441/CHANGE_ME"
  use_tcp: true
  reconnect_delay: 5.0

motion:
  enabled: true
  min_area_frac: 0.003      # raise if wind/leaves cause false triggers
  var_threshold: 40
  active_window: 4.0

detector:
  model: "yolov8n.pt"       # n=fast, s/m=more accurate
  min_confidence: 0.35
  crop_pad_frac: 0.15

classifier:
  backend: "bioclip"        # "stub" | "bioclip" (local, no key) | "tfhub" | "claude"
  min_confidence: 0.30      # below this a visit is logged as "Unknown bird"
  tfhub_handle: "https://tfhub.dev/google/aiy/vision/classifier/birds_V1/1"
  claude_model: "claude-opus-4-8"

pipeline:
  visit_timeout: 60.0       # seconds of no sighting before a visit is closed
  min_visit_frames: 2       # ignore blips seen in fewer frames than this
  save_crops: true
  # Distributed mode: let a beefy PC do detection and POST each visit to the Pi's
  # dashboard. On the PC set ingest_url to the Pi + a shared token; set the SAME
  # token on the Pi (its web app checks it). Empty ingest_url = write locally.
  ingest_url: ""            # e.g. "http://192.168.1.138:8000/api/ingest"
  ingest_token: ""

web:
  host: "127.0.0.1"
  port: 8000
  debug: false

paths:
  db: "data/birdwatcher.db"
  captures: "data/captures"

audio:
  # Path to BirdNET-Go's birdnet.db to overlay acoustic "heard" detections on the
  # dashboard (read-only). Empty = audio layer off. On the Pi this is typically
  # /mnt/birddata/birdnet-go-app/data/birdnet.db
  birdnet_db: ""
